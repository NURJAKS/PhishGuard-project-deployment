<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard - Мои документы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
            color: white;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
            color: rgba(255,255,255,0.9);
        }
        
        .upload-section {
            background: rgba(40, 40, 40, 0.9);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 2px solid rgba(76,175,80,0.3);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .upload-section h2 {
            color: #4CAF50;
            margin-bottom: 20px;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .upload-area {
            border: 2px dashed rgba(76,175,80,0.5);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .upload-area:hover {
            border-color: #4CAF50;
            background: rgba(76,175,80,0.1);
        }
        
        .upload-area.dragover {
            border-color: #4CAF50;
            background: rgba(76,175,80,0.2);
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            font-size: 18px;
            color: #4CAF50;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .upload-hint {
            font-size: 14px;
            color: #888;
        }
        
        #file-input {
            display: none;
        }
        
        .upload-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76,175,80,0.3);
        }
        
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76,175,80,0.5);
        }
        
        .documents-section {
            background: rgba(40, 40, 40, 0.9);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .documents-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .documents-header h2 {
            color: #e0e0e0;
            font-size: 22px;
        }
        
        .documents-header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .documents-count {
            background: rgba(76,175,80,0.2);
            color: #4CAF50;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .btn-clear {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(244,67,54,0.3);
        }
        
        .btn-clear:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(244,67,54,0.5);
            background: linear-gradient(135deg, #d32f2f, #c62828);
        }
        
        .documents-list {
            display: grid;
            gap: 15px;
        }
        
        .document-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .document-card:hover {
            border-color: rgba(76,175,80,0.5);
            background: rgba(0,0,0,0.6);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .document-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        
        .document-name {
            font-size: 18px;
            font-weight: 600;
            color: #e0e0e0;
            word-break: break-all;
            flex: 1;
        }
        
        .document-date {
            font-size: 12px;
            color: #888;
            white-space: nowrap;
            margin-left: 15px;
        }
        
        .document-info {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #b0b0b0;
        }
        
        .document-info-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .document-link-section {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(76,175,80,0.3);
        }
        
        .document-link-label {
            font-size: 12px;
            color: #4CAF50;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .document-link-input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(76,175,80,0.5);
            border-radius: 6px;
            color: #4CAF50;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            word-break: break-all;
        }
        
        .document-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-copy {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            flex: 1;
        }
        
        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(76,175,80,0.4);
        }
        
        .btn-open {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
            flex: 1;
        }
        
        .btn-open:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(33,150,243,0.4);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .spinner {
            border: 3px solid rgba(76,175,80,0.3);
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-text {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .empty-hint {
            font-size: 14px;
            color: #666;
        }
        
        .success-message {
            background: rgba(76,175,80,0.2);
            border: 1px solid rgba(76,175,80,0.5);
            color: #4CAF50;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error-message {
            background: rgba(244,67,54,0.2);
            border: 1px solid rgba(244,67,54,0.5);
            color: #f44336;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ PhishGuard - Мои документы</h1>
            <p>Управление загруженными документами и их публичными ссылками</p>
        </div>
        
        <div id="success-message" class="success-message"></div>
        <div id="error-message" class="error-message"></div>
        
        <div class="upload-section">
            <h2>📄 Загрузить новый документ</h2>
            <div class="upload-area" id="upload-area">
                <div class="upload-icon">📄</div>
                <div class="upload-text">Перетащите PDF файл сюда или нажмите для выбора</div>
                <div class="upload-hint">Поддерживаются файлы: PDF, DOC, DOCX (макс. 10MB)</div>
                <input type="file" id="file-input" accept=".pdf,.doc,.docx">
                <button class="upload-btn" onclick="document.getElementById('file-input').click()">
                    Выбрать файл
                </button>
            </div>
        </div>
        
        <div class="documents-section">
            <div class="documents-header">
                <h2>📚 Все документы</h2>
                <div class="documents-header-actions">
                    <div class="documents-count" id="documents-count">Загрузка...</div>
                    <button class="btn-clear" id="clear-documents-btn" onclick="clearAllDocuments()">
                        🗑️ Очистить историю
                    </button>
                </div>
            </div>
            <div id="documents-list" class="documents-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Загрузка документов...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        
        // Показываем сообщение
        function showMessage(message, isError = false) {
            const messageDiv = isError ? document.getElementById('error-message') : document.getElementById('success-message');
            messageDiv.textContent = message;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        // Форматирование размера файла
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }
        
        // Форматирование даты
        function formatDate(dateString) {
            try {
                const date = new Date(dateString);
                return date.toLocaleString('ru-RU', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch (e) {
                return dateString;
            }
        }
        
        // Загрузка списка документов
        async function loadDocuments() {
            try {
                const response = await fetch(`${API_BASE}/v1/documents/list`);
                if (!response.ok) throw new Error('Не удалось загрузить документы');
                
                const data = await response.json();
                displayDocuments(data.documents);
                document.getElementById('documents-count').textContent = `${data.total} документов`;
            } catch (error) {
                console.error('Error loading documents:', error);
                document.getElementById('documents-list').innerHTML = `
                    <div class="error-message" style="display:block;">
                        ❌ Не удалось загрузить документы: ${error.message}
                    </div>
                `;
            }
        }
        
        // Отображение документов
        function displayDocuments(documents) {
            const listDiv = document.getElementById('documents-list');
            
            if (documents.length === 0) {
                listDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📄</div>
                        <div class="empty-text">Нет загруженных документов</div>
                        <div class="empty-hint">Загрузите первый документ выше</div>
                    </div>
                `;
                return;
            }
            
            listDiv.innerHTML = documents.map(doc => `
                <div class="document-card">
                    <div class="document-header">
                        <div class="document-name">📄 ${doc.original_filename}</div>
                        <div class="document-date">${formatDate(doc.uploaded_at)}</div>
                    </div>
                    <div class="document-info">
                        <div class="document-info-item">
                            <span>📊</span>
                            <span>${formatFileSize(doc.file_size)}</span>
                        </div>
                        <div class="document-info-item">
                            <span>📎</span>
                            <span>${doc.file_ext.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="document-link-section">
                        <div class="document-link-label">🔗 Публичная ссылка:</div>
                        <input type="text" class="document-link-input" value="${doc.share_url}" readonly id="link-${doc.doc_id}">
                        <div class="document-actions">
                            <button class="btn btn-copy" onclick="copyLink('${doc.doc_id}', '${doc.share_url}')">
                                📋 Копировать
                            </button>
                            <button class="btn btn-open" onclick="window.open('${doc.share_url}', '_blank')">
                                🔗 Открыть
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // Копирование ссылки
        async function copyLink(docId, url) {
            try {
                await navigator.clipboard.writeText(url);
                showMessage('✅ Ссылка скопирована в буфер обмена!');
                
                // Обновляем кнопку
                const btn = event.target;
                btn.textContent = '✓ Скопировано!';
                btn.style.background = 'linear-gradient(135deg, #45a049, #4CAF50)';
                setTimeout(() => {
                    btn.textContent = '📋 Копировать';
                    btn.style.background = 'linear-gradient(135deg, #4CAF50, #45a049)';
                }, 2000);
            } catch (err) {
                // Fallback
                const input = document.getElementById(`link-${docId}`);
                input.select();
                document.execCommand('copy');
                showMessage('✅ Ссылка скопирована!');
            }
        }
        
        // Загрузка файла
        async function uploadFile(file) {
            if (!file) return;
            
            // Проверка типа файла
            const fileName = file.name.toLowerCase();
            const validExtensions = ['.pdf', '.doc', '.docx'];
            const isValid = validExtensions.some(ext => fileName.endsWith(ext));
            
            if (!isValid) {
                showMessage('❌ Поддерживаются только файлы PDF, DOC и DOCX', true);
                return;
            }
            
            // Проверка размера
            if (file.size > 10 * 1024 * 1024) {
                showMessage('❌ Размер файла не должен превышать 10MB', true);
                return;
            }
            
            try {
                // Показываем индикатор загрузки
                const uploadArea = document.getElementById('upload-area');
                uploadArea.innerHTML = `
                    <div class="spinner"></div>
                    <div style="margin-top:15px; color:#4CAF50; font-weight:600;">Загрузка документа...</div>
                `;
                
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch(`${API_BASE}/v1/document/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || `HTTP ${response.status}`);
                }
                
                const result = await response.json();
                
                // Восстанавливаем upload area
                uploadArea.innerHTML = `
                    <div class="upload-icon">📄</div>
                    <div class="upload-text">Перетащите PDF файл сюда или нажмите для выбора</div>
                    <div class="upload-hint">Поддерживаются файлы: PDF, DOC, DOCX (макс. 10MB)</div>
                    <input type="file" id="file-input" accept=".pdf,.doc,.docx">
                    <button class="upload-btn" onclick="document.getElementById('file-input').click()">
                        Выбрать файл
                    </button>
                `;
                
                // Настраиваем обработчики заново
                setupUploadHandlers();
                
                showMessage(`✅ Документ "${result.original_filename}" успешно загружен!`);
                
                // Обновляем список документов
                await loadDocuments();
                
            } catch (error) {
                console.error('Upload error:', error);
                showMessage(`❌ Ошибка загрузки: ${error.message}`, true);
                
                // Восстанавливаем upload area
                const uploadArea = document.getElementById('upload-area');
                uploadArea.innerHTML = `
                    <div class="upload-icon">📄</div>
                    <div class="upload-text">Перетащите PDF файл сюда или нажмите для выбора</div>
                    <div class="upload-hint">Поддерживаются файлы: PDF, DOC, DOCX (макс. 10MB)</div>
                    <input type="file" id="file-input" accept=".pdf,.doc,.docx">
                    <button class="upload-btn" onclick="document.getElementById('file-input').click()">
                        Выбрать файл
                    </button>
                `;
                setupUploadHandlers();
            }
        }
        
        // Настройка обработчиков загрузки
        function setupUploadHandlers() {
            const fileInput = document.getElementById('file-input');
            const uploadArea = document.getElementById('upload-area');
            
            // Клик по области загрузки
            uploadArea.addEventListener('click', () => {
                fileInput.click();
            });
            
            // Выбор файла
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    uploadFile(file);
                }
            });
            
            // Drag and drop
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                
                const file = e.dataTransfer.files[0];
                if (file) {
                    uploadFile(file);
                }
            });
        }
        
        // Очистка всех документов
        async function clearAllDocuments() {
            if (!confirm('⚠️ Вы уверены, что хотите удалить все загруженные документы?\n\nЭто действие нельзя отменить!')) {
                return;
            }
            
            const clearBtn = document.getElementById('clear-documents-btn');
            const originalText = clearBtn.textContent;
            
            try {
                clearBtn.disabled = true;
                clearBtn.textContent = '🗑️ Удаление...';
                
                const response = await fetch(`${API_BASE}/v1/documents/clear`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || `HTTP ${response.status}`);
                }
                
                const result = await response.json();
                showMessage(`✅ ${result.message || 'Документы удалены'}\nОсвобождено: ${result.deleted_size_mb || 0} MB`);
                
                // Обновляем список документов
                await loadDocuments();
                
            } catch (error) {
                console.error('Error clearing documents:', error);
                showMessage(`❌ Не удалось удалить документы: ${error.message}`, true);
            } finally {
                clearBtn.disabled = false;
                clearBtn.textContent = originalText;
            }
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            setupUploadHandlers();
            loadDocuments();
            
            // Автообновление каждые 30 секунд
            setInterval(loadDocuments, 30000);
        });
    </script>
</body>
</html>
